---
- name: Deploy Tailscale subnet router
  hosts: tailscale_subnet_router
  become: true
  pre_tasks:
    - name: Enable IPv4 forwarding
      ansible.posix.sysctl:
        name: net.ipv4.ip_forward
        value: "1"
        sysctl_set: true
        state: present
        reload: true
    - name: Enable IPv6 forwarding
      ansible.posix.sysctl:
        name: net.ipv6.conf.all.forwarding
        value: "1"
        sysctl_set: true
        state: present
        reload: true
  roles:
    - base
    - artis3n.tailscale.machine
  vars:
    tailscale_authkey: "{{ lookup('ansible.builtin.env', 'TAILSCALE_KEY') }}"
    tailscale_args: "--advertise-routes=192.168.20.0/24"
