---
- name: Create folder for Uptime Kuma data files
  ansible.builtin.file:
    path: "{{ podman_appdata_dir }}/uptime-kuma/data"
    state: directory
    owner: "{{ podman_user }}"
    group: "{{ podman_group }}"
    mode: "0755"
- name: Create uptime-kuma quadlet
  containers.podman.podman_container:
    name: uptime-kuma
    image: docker.io/louislam/uptime-kuma:2.1.1@sha256:e4045dc9b2b96a5503be7372e3b648104ba7153e452974c2247c66178389ac39
    state: quadlet
    quadlet_filename: uptime-kuma
    quadlet_file_mode: "0644"
    quadlet_dir: "{{ quadlet_dir }}"
    ports:
      - "3001:3001"
    volumes:
      - "{{ podman_appdata_dir }}/uptime-kuma/data:/app/data:Z"
    cap_add:
      - NET_RAW
    quadlet_options:
      - "NoNewPrivileges=true"
      - |
        [Service]
        Restart=always
      - |
        [Install]
        WantedBy=default.target
- name: Open firewalld port for Uptime Kuma
  ansible.posix.firewalld:
    port: "3001/tcp"
    permanent: true
    immediate: true
    state: enabled
  notify:
    - Reload firewalld
