---
- name: Create folder for Changedetection data
  ansible.builtin.file:
    path: "{{ podman_appdata_dir }}/changedetection/datastore"
    state: directory
    owner: "{{ podman_user }}"
    group: "{{ podman_group }}"
    mode: "0755"
- name: Copy Changedetection environment files
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ quadlet_dir }}"
    owner: "{{ podman_user }}"
    group: "{{ podman_group }}"
    mode: "0600"
  loop:
    - changedetection.env
    - chromium-playwright.env
- name: Create changedetection pod
  containers.podman.podman_pod:
    name: changedetection
    state: quadlet
    quadlet_filename: changedetection
    quadlet_file_mode: "0644"
    quadlet_dir: "{{ quadlet_dir }}"
    infra_name: "changedetection-pod"
    ports:
      - "5000:5000"
- name: Create chromium-playwright Quadlet
  containers.podman.podman_container:
    name: chromium-playwright
    image: ghcr.io/browserless/chromium:v2.45.0@sha256:0af52bb7179d622edebaade5e92bfc122bf9d594b63cb697cead5dc76fcd4150
    state: quadlet
    quadlet_filename: chromium-playwright
    quadlet_file_mode: "0644"
    quadlet_dir: "{{ quadlet_dir }}"
    pod: changedetection.pod
    env_file:
      - chromium-playwright.env
    shm_size: "2gb"
    quadlet_options:
      - "NoNewPrivileges=true"
      - |
        [Service]
        Restart=always
      - |
        [Install]
        WantedBy=default.target
- name: Create changedetection Quadlet
  containers.podman.podman_container:
    name: changedetection
    image: ghcr.io/dgtlmoon/changedetection.io:0.54.7@sha256:b632a9fb6be702fb859e02cd5cac5de7a7466ce1e97f5f5347a1d012c0720108
    state: quadlet
    quadlet_filename: changedetection
    quadlet_file_mode: "0644"
    quadlet_dir: "{{ quadlet_dir }}"
    pod: changedetection.pod
    volumes:
      - "{{ podman_appdata_dir }}/changedetection/datastore:/datastore:Z"
    env_file:
      - changedetection.env
    quadlet_options:
      - "NoNewPrivileges=true"
      - |
        [Unit]
        Requires=chromium-playwright.service
        After=chromium-playwright.service
      - |
        [Service]
        Restart=always
      - |
        [Install]
        WantedBy=default.target
- name: Open firewalld port for Changedetection
  ansible.posix.firewalld:
    port: "5000/tcp"
    permanent: true
    immediate: true
    state: enabled
  notify:
    - Reload firewalld
