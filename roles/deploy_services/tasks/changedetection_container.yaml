---
- name: Create folder for Changedetection data
  ansible.builtin.file:
    path: "{{ podman_appdata_dir }}/changedetection/datastore"
    state: directory
    owner: "{{ podman_user }}"
    group: "{{ podman_group }}"
    mode: "0755"
- name: Copy Changedetection environment files
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ quadlet_dir }}"
    owner: "{{ podman_user }}"
    group: "{{ podman_group }}"
    mode: "0600"
  loop:
    - changedetection.env
    - chromium-playwright.env
- name: Create changedetection pod
  containers.podman.podman_pod:
    name: changedetection
    state: quadlet
    quadlet_filename: changedetection
    quadlet_file_mode: "0644"
    quadlet_dir: "{{ quadlet_dir }}"
    infra_name: "changedetection-pod"
    ports:
      - "5000:5000"
- name: Create chromium-playwright Quadlet
  containers.podman.podman_container:
    name: chromium-playwright
    image: ghcr.io/browserless/chromium:v2.42.0@sha256:71ae7fa09bd1bf78efaa2803d75c837ab5a56e0d7637695bff3077d87248e642
    state: quadlet
    quadlet_filename: chromium-playwright
    quadlet_file_mode: "0644"
    quadlet_dir: "{{ quadlet_dir }}"
    pod: changedetection.pod
    env_file:
      - chromium-playwright.env
    shm_size: "2gb"
    quadlet_options:
      - "NoNewPrivileges=true"
      - |
        [Service]
        Restart=always
      - |
        [Install]
        WantedBy=default.target
- name: Create changedetection Quadlet
  containers.podman.podman_container:
    name: changedetection
    image: ghcr.io/dgtlmoon/changedetection.io:0.53.6@sha256:928ec9ddf0be01dfe7ce390d3ece5c5d03d774407c8af37e41f2b780503e972a
    state: quadlet
    quadlet_filename: changedetection
    quadlet_file_mode: "0644"
    quadlet_dir: "{{ quadlet_dir }}"
    pod: changedetection.pod
    volumes:
      - "{{ podman_appdata_dir }}/changedetection/datastore:/datastore:Z"
    env_file:
      - changedetection.env
    quadlet_options:
      - "NoNewPrivileges=true"
      - |
        [Unit]
        Requires=chromium-playwright.service
        After=chromium-playwright.service
      - |
        [Service]
        Restart=always
      - |
        [Install]
        WantedBy=default.target
- name: Open firewalld port for Changedetection
  ansible.posix.firewalld:
    port: "5000/tcp"
    permanent: true
    immediate: true
    state: enabled
  notify:
    - Reload firewalld
